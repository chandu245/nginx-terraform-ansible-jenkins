---
- hosts: webserver
  become: yes
  vars:
    web_content: "Good things happen to Good people, no need to worry"
  tasks:
    - name: Install Nginx
      yum:
        name: nginx
        state: present

    - name: Ensure Nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Deploy index.html
      copy:
        dest: /usr/share/nginx/html/index.html
        content: "{{ web_content }}"
        owner: nginx
        group: nginx
        mode: '0644'
